<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
  background:#101828;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  text-align:center;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#7F56D9;
  color:white;
  cursor:pointer;
}

</style>

</head>
<body>

<div class="box">

<h1>Welcome to Smart Task Scheduler</h1>

<p>You are logged in successfully.</p>

<button onclick="logout()">
Logout
</button>

</div>

<script type="module">

import {
  auth,
  signOut
} from "./firebase.js";

window.logout = async () => {

  await signOut(auth);

  window.location.href = "index.html";
};

</script>

</body>
</html>
